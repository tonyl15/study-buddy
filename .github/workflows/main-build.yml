name: Main Build (CD Gate)

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Optional, but keeps main extra clean even if branch protections are misconfigured
      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
          retention-days: 14